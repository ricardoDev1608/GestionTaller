<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Clientes</title>
</head>
<body>
  <nav>
    <a href="{% url 'inicio' %}">Inicio</a> |
    <a href="{% url 'lista_coches' %}">Coches</a> |
    <a href="{% url 'lista_servicios' %}">Servicios</a>
  </nav>

  <h2>Lista de clientes</h2>
  <a href="{% url 'nuevo_cliente' %}">Añadir nuevo cliente</a>

  <ul>
    {% for cliente in clientes %}
      <li>{{ cliente.id }} - {{ cliente.nombre }} - {{ cliente.telefono }} - {{ cliente.email }}</li>
    {% empty %}
      <li>No hay clientes registrados.</li>
    {% endfor %}
  </ul>
</body>
</html>
