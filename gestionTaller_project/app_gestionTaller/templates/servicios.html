<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Servicios</title>
</head>
<body>
  <nav>
    <a href="{% url 'inicio' %}">Inicio</a> |
    <a href="{% url 'lista_clientes' %}">Clientes</a> |
    <a href="{% url 'lista_coches' %}">Coches</a>
  </nav>

  <h2>Lista de servicios</h2>
  <a href="{% url 'nuevo_servicio' %}">Añadir nuevo servicio</a>

  <ul>
    {% for servicio in servicios %}
      <li>{{ servicio.id }} - {{ servicio.nombre }} - {{ servicio.descripcion }}</li>
    {% empty %}
      <li>No hay servicios registrados.</li>
    {% endfor %}
  </ul>
</body>
</html>
